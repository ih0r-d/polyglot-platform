version: "3"

tasks:
  clean:
    desc: Remove Maven build output and generated files
    cmds:
      - ./bin/clean.sh

  build:
    desc: Build project
    cmds:
      - ./bin/build.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  test:
    desc: Run tests
    cmds:
      - ./bin/test.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  verify:
    desc: Run verify
    cmds:
      - ./bin/verify.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  format:
    desc: Format code with Spotless
    cmds:
      - ./bin/format.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  version:
    desc: Show current project version
    cmds:
      - ./bin/version.sh

  bump:
    desc: Bump project version (patch|minor|major)
    cmds:
      - ./bin/bump.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{else}} patch{{end}}

  release:
    desc: Release the full project
    cmds:
      - ./bin/release.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  clean-remote-tags:
    desc: Delete remote tags that don't exist locally
    cmds:
      - ./bin/clean-remote-tags.sh

  pre-commit-maven:
    desc: Run the local Maven pre-commit checks
    cmds:
      - ./bin/pre-commit-maven.sh{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  default:
    desc: Default task (clean + build)
    cmds:
      - task: clean
      - task: build

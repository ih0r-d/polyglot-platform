site_name: polyglot-adapter
site_description: Runtime and build-time support for GraalVM polyglot integrations on the JVM
site_url: https://ih0r-d.github.io/polyglot-platform/

repo_url: https://github.com/ih0r-d/polyglot-platform
repo_name: polyglot-platform

theme:
  name: material
  palette:
    - scheme: default
      primary: white
      accent: indigo
  font:
    text: Roboto
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Overview: overview.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - Architecture: architecture.md
  - Compatibility: compatibility.md
  - Runtime: runtime.md
  - Code Generation: codegen.md
  - Examples: examples.md
  - Release Process: release-process.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - footnotes
  - attr_list
  - def_list
  - md_in_html

extra:
  version:
    provider: none

copyright: Copyright © 2026 Ihor Didyk

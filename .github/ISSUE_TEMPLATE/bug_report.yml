name: Bug report
description: Report a defect in runtime behavior, build tooling, or documentation.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect and the affected module.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide steps, sample code, or a minimal reproducer.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Java, GraalVM, Maven, OS, and module versions.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Links to stack traces, logs, or related issues.

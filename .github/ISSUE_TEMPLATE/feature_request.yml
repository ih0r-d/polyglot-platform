name: Feature request
description: Propose a new capability or improvement for the platform.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or developer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe existing workarounds or rejected options.
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Note any public API, build, or runtime compatibility concerns.

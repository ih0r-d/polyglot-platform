name: Checks / Main

on:
  pull_request:
    branches:
      - main
      - release/*
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yaml"
      - ".mvn/**"
      - "mvnw"
      - "mvnw.cmd"
      - "pom.xml"
      - "api/**"
      - "runtime/**"
      - "build-tools/**"
  push:
    branches:
      - main
      - release/*
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yaml"
      - ".mvn/**"
      - "mvnw"
      - "mvnw.cmd"
      - "pom.xml"
      - "api/**"
      - "runtime/**"
      - "build-tools/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Spotless formatting check
        run: ./mvnw -B -ntp spotless:check

      - name: Build project and run tests
        run: ./mvnw -B -ntp clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
          if-no-files-found: ignore

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            **/target/site/jacoco/jacoco.xml
            **/target/site/jacoco/index.html
          if-no-files-found: ignore

  quality:
    name: Quality Profile
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run quality profile
        run: ./mvnw -B -ntp -Pquality clean verify

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: |
            **/target/spotbugsXml.xml
            **/target/site/spotbugs.html
          if-no-files-found: ignore

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build project for CodeQL
        run: ./mvnw -B -ntp -DskipTests verify

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  snyk:
    name: Snyk
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Snyk CLI
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/setup@v1.0.0

      - name: Run Snyk Maven scan
        if: env.SNYK_TOKEN != ''
        run: |
          set +e
          snyk test --maven-aggregate-project --severity-threshold=high --sarif-file-output=snyk.sarif -- -Dmaven.plugin.skipErrorNoDescriptorsFound=true
          exit_code=$?
          printf '%s\n' "$exit_code" > .snyk-exit-code
          exit 0

      - name: Detect Snyk SARIF output
        id: snyk-sarif
        if: always()
        run: |
          if [ -f snyk.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Snyk SARIF
        if: always() && steps.snyk-sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

      - name: Update Snyk project snapshot
        if: env.SNYK_TOKEN != ''
        run: |
          if [ -f .snyk-exit-code ] && [ "$(cat .snyk-exit-code)" = "0" ]; then
            snyk monitor --maven-aggregate-project --target-reference="${{ github.ref_name }}" -- -Dmaven.plugin.skipErrorNoDescriptorsFound=true
          else
            echo "Skipping snyk monitor because the scan did not succeed."
          fi

      - name: Fail when Snyk finds high severity issues
        if: always() && env.SNYK_TOKEN != ''
        run: |
          if [ ! -f .snyk-exit-code ]; then
            echo "Snyk scan did not produce an exit code marker."
            exit 1
          fi
          exit_code="$(cat .snyk-exit-code)"
          if [ "$exit_code" != "0" ]; then
            echo "Snyk reported vulnerabilities or scan errors. Exit code: $exit_code"
            exit 1
          fi

      - name: Skip Snyk scan when token is unavailable
        if: env.SNYK_TOKEN == ''
        run: echo "Skipping Snyk because SNYK_TOKEN is not configured."

  analysis:
    name: Coverage and SonarCloud
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}
          restore-keys: sonar-${{ runner.os }}-

      - name: Build project and generate coverage
        run: ./mvnw -B -ntp -Pquality clean verify

      - name: Publish coverage summary
        if: always()
        run: |
          python3 <<'PY'
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          reports = sorted(Path(".").glob("**/target/site/jacoco/jacoco.xml"))
          reports = [p for p in reports if "samples/" not in p.as_posix()]

          rows = []
          total_missed = 0
          total_covered = 0

          for report in reports:
            root = ET.parse(report).getroot()
            counters = [c for c in root.findall("counter") if c.attrib.get("type") == "INSTRUCTION"]
            if not counters:
              continue

            counter = counters[0]
            missed = int(counter.attrib["missed"])
            covered = int(counter.attrib["covered"])
            total = missed + covered
            pct = (covered / total * 100) if total else 0.0

            module = report.relative_to(Path(".")).as_posix().replace("/target/site/jacoco/jacoco.xml", "")
            rows.append((module, covered, total, pct))
            total_missed += missed
            total_covered += covered

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as summary:
            summary.write("## Coverage Summary\n\n")
            if not rows:
              summary.write("No JaCoCo XML reports were found.\n")
            else:
              total_instructions = total_missed + total_covered
              total_pct = (total_covered / total_instructions * 100) if total_instructions else 0.0
              summary.write(f"**Total instruction coverage:** {total_pct:.2f}% ({total_covered}/{total_instructions})\n\n")
              summary.write("| Module | Coverage |\n")
              summary.write("| --- | ---: |\n")
              for module, covered, total, pct in rows:
                summary.write(f"| `{module}` | {pct:.2f}% ({covered}/{total}) |\n")
          PY

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          files: ./build-tools/polyglot-codegen/target/site/jacoco/jacoco.xml,./runtime/polyglot-adapter/target/site/jacoco/jacoco.xml,./runtime/polyglot-spring-boot-starter/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Run SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        run: >
          ./mvnw -B -ntp
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.token="${SONAR_TOKEN}"
          -Dsonar.qualitygate.wait=true

      - name: Skip Codecov upload when token is unavailable
        if: env.CODECOV_TOKEN == ''
        run: echo "Skipping Codecov upload because CODECOV_TOKEN is not configured."

      - name: Skip SonarCloud analysis when token is unavailable
        if: env.SONAR_TOKEN == ''
        run: echo "Skipping SonarCloud analysis because SONAR_TOKEN is not configured."

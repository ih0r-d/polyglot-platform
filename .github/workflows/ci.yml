name: CI

on:
  pull_request:
    branches:
      - main
      - release/*
  push:
    branches:
      - main
      - release/*

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and Test (${{ matrix.name }}, JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - java: "21"
            name: API and build tooling
            modules: api/polyglot-annotations,api/polyglot-model,build-tools/polyglot-codegen,build-tools/polyglot-codegen-maven-plugin
          - java: "25"
            name: Runtime modules
            modules: runtime/polyglot-adapter,runtime/polyglot-spring-boot-starter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Temurin JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Spotless formatting check
        run: mvn -B -ntp -pl "${{ matrix.modules }}" -am spotless:check

      - name: Build project and run tests
        run: mvn -B -ntp -pl "${{ matrix.modules }}" -am verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk-${{ matrix.java }}
          path: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
          if-no-files-found: ignore

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports-jdk-${{ matrix.java }}
          path: |
            **/target/site/jacoco/jacoco.xml
            **/target/site/jacoco/index.html
          if-no-files-found: ignore

  analysis:
    name: Coverage and SonarCloud
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}
          restore-keys: sonar-${{ runner.os }}-

      - name: Build project and generate coverage
        run: mvn -B -ntp verify

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./build-tools/polyglot-codegen/target/site/jacoco/jacoco.xml,./runtime/polyglot-adapter/target/site/jacoco/jacoco.xml,./runtime/polyglot-spring-boot-starter/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Run SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B -ntp sonar:sonar -Dsonar.token="${SONAR_TOKEN}"

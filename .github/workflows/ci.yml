name: Checks / Main

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-vulnerability-gate:
    name: Dependency & Vulnerability Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high

      - name: Install Snyk CLI
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      - name: Snyk Open Source Scan
        if: env.SNYK_TOKEN != ''
        shell: bash
        run: |
          set +e
          snyk test \
            --maven-aggregate-project \
            --severity-threshold=high \
            --json-file-output=snyk-report.json \
            --sarif-file-output=snyk-report.sarif \
            -- -Dmaven.plugin.skipErrorNoDescriptorsFound=true 2>&1 | tee snyk-report.txt
          exit_code=${PIPESTATUS[0]}
          printf '%s\n' "$exit_code" > snyk-exit-code.txt
          exit 0

      - name: Detect Snyk SARIF output
        id: snyk-sarif
        if: always()
        shell: bash
        run: |
          if [ -f snyk-report.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Snyk SARIF
        if: always() && steps.snyk-sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          sarif_file: snyk-report.sarif

      - name: Upload Snyk reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: snyk-reports
          path: |
            snyk-report.txt
            snyk-report.json
            snyk-report.sarif
            snyk-exit-code.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Summarize Snyk result
        if: always() && env.SNYK_TOKEN != ''
        shell: bash
        run: |
          {
            echo "## Snyk Maven Scan"
            echo

            if [ ! -f snyk-exit-code.txt ]; then
              echo "Snyk did not produce an exit code marker. Treat this as a scan/setup failure."
              exit 0
            fi

            exit_code="$(cat snyk-exit-code.txt)"
            case "$exit_code" in
              0)
                echo "Result: passed. No high or critical vulnerable paths were reported."
                ;;
              1)
                echo "Result: failed. Snyk reported high or critical vulnerabilities."
                echo
                echo "Open the \`snyk-reports\` artifact for:"
                echo "- human-readable output: \`snyk-report.txt\`"
                echo "- machine-readable output: \`snyk-report.json\`"
                echo "- code scanning output when available: \`snyk-report.sarif\`"
                ;;
              2)
                echo "Result: failed. Snyk reported a scan/setup error, not a vulnerability finding."
                echo
                echo "Check \`snyk-report.txt\` in the \`snyk-reports\` artifact for CLI diagnostics."
                ;;
              3)
                echo "Result: failed. Snyk did not detect supported projects."
                echo
                echo "Check Maven project detection and the Snyk CLI output in \`snyk-report.txt\`."
                ;;
              *)
                echo "Result: failed. Snyk returned unexpected exit code \`${exit_code}\`."
                echo
                echo "Check \`snyk-report.txt\` in the \`snyk-reports\` artifact."
                ;;
            esac
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update Snyk project snapshot
        if: env.SNYK_TOKEN != '' && github.event_name != 'pull_request'
        shell: bash
        run: |
          if [ -f snyk-exit-code.txt ] && [ "$(cat snyk-exit-code.txt)" = "0" ]; then
            snyk monitor --maven-aggregate-project --target-reference="${{ github.ref_name }}" -- -Dmaven.plugin.skipErrorNoDescriptorsFound=true
          else
            echo "Skipping snyk monitor because the scan did not succeed."
          fi

      - name: Fail on Snyk vulnerabilities or scan errors
        if: always() && env.SNYK_TOKEN != ''
        shell: bash
        run: |
          if [ ! -f snyk-exit-code.txt ]; then
            echo "Snyk scan did not produce an exit code marker."
            exit 1
          fi
          exit_code="$(cat snyk-exit-code.txt)"
          case "$exit_code" in
            0)
              echo "Snyk scan passed."
              ;;
            1)
              echo "Snyk reported high or critical vulnerabilities. See snyk-report.txt/json and the job summary."
              exit 1
              ;;
            2)
              echo "Snyk scan/setup failed. See snyk-report.txt and the job summary."
              exit 1
              ;;
            3)
              echo "Snyk did not detect supported projects. See snyk-report.txt and the job summary."
              exit 1
              ;;
            *)
              echo "Snyk returned unexpected exit code: $exit_code. See snyk-report.txt and the job summary."
              exit 1
              ;;
          esac

      - name: Skip Snyk scan when token is unavailable
        if: env.SNYK_TOKEN == ''
        run: echo "Skipping Snyk because SNYK_TOKEN is not configured."

  baseline-java21:
    name: Baseline / Java 21
    runs-on: ubuntu-latest
    needs: dependency-vulnerability-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1
        with:
          distribution: graalvm-community
          java-version: "21"
          cache: maven

      - name: Spotless formatting check
        run: ./mvnw -B -ntp spotless:check

      - name: Build project and run tests on Java 21
        run: ./mvnw -B -ntp clean test

      - name: Upload Maven test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: maven-test-reports-java21
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 14

  runtime-graalvm25:
    name: Runtime / GraalVM 25
    runs-on: ubuntu-latest
    needs: dependency-vulnerability-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1
        with:
          distribution: graalvm-community
          java-version: "25"
          cache: maven

      - name: Run runtime verification on GraalVM 25
        run: ./mvnw -B -ntp -pl runtime/polyglot-adapter,runtime/polyglot-spring-boot-starter -am clean test

      - name: Upload Maven test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: maven-test-reports-graalvm25
          path: |
            runtime/**/target/surefire-reports/**
            runtime/**/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 14

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    needs:
      - baseline-java21
      - runtime-graalvm25

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Build documentation
        run: ./.dev/bin/docs-build.sh

      - name: Upload docs site
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-site
          path: site
          if-no-files-found: ignore
          retention-days: 14

  samples:
    name: "Samples validation / ${{ matrix.display }}"
    runs-on: ubuntu-latest
    needs:
      - baseline-java21
      - runtime-graalvm25
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(github.event_name == 'workflow_dispatch' && '{"include":[{"sample":"java-maven-example","display":"Samples / Java Maven Example","path":"samples/java-maven-example","kind":"maven"},{"sample":"java-maven-codegen-example","display":"Samples / Java Maven Codegen Example","path":"samples/java-maven-codegen-example","kind":"maven"},{"sample":"spring-boot-example","display":"Samples / Spring Boot Example","path":"samples/spring-boot-example","kind":"maven"},{"sample":"aot-fat-jar","display":"Java+Python AOT / JVM Fat JAR","path":"samples/java-python-aot-adapter","kind":"aot-fat-jar"},{"sample":"aot-native-image","display":"Java+Python AOT / Native Image","path":"samples/java-python-aot-adapter","kind":"aot-native-image"}]}' || '{"include":[{"sample":"java-maven-example","display":"Samples / Java Maven Example","path":"samples/java-maven-example","kind":"maven"},{"sample":"java-maven-codegen-example","display":"Samples / Java Maven Codegen Example","path":"samples/java-maven-codegen-example","kind":"maven"},{"sample":"spring-boot-example","display":"Samples / Spring Boot Example","path":"samples/spring-boot-example","kind":"maven"}]}') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1
        with:
          distribution: graalvm-community
          java-version: "25"
          native-image-job-reports: ${{ matrix.kind == 'aot-native-image' && 'true' || 'false' }}
          cache: maven

      - name: Install local platform artifacts
        run: ./mvnw -B -ntp -DskipTests install

      - name: Validate sample versions
        run: ./.dev/bin/validate-sample-versions.sh

      - name: Verify Maven sample
        if: matrix.kind == 'maven'
        run: mvn -B -ntp -DskipTests verify
        working-directory: ${{ matrix.path }}

      - name: Build AOT fat JAR
        if: matrix.kind == 'aot-fat-jar'
        run: mvn -B -ntp clean package
        working-directory: ${{ matrix.path }}

      - name: Run AOT fat JAR
        if: matrix.kind == 'aot-fat-jar'
        run: java -jar target/java-python-aot-adapter-0.0.1-all.jar
        working-directory: ${{ matrix.path }}

      - name: Build AOT native image
        if: matrix.kind == 'aot-native-image'
        run: |
          chmod +x ./build-native.sh
          ./build-native.sh
        working-directory: ${{ matrix.path }}

      - name: Run AOT native image
        if: matrix.kind == 'aot-native-image'
        run: ./target/java-python-aot-adapter
        working-directory: ${{ matrix.path }}

      - name: Upload sample reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sample-reports-${{ matrix.sample }}
          path: |
            ${{ matrix.path }}/target/surefire-reports/**
            ${{ matrix.path }}/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Summarize sample result
        if: success()
        run: |
          {
            echo "## ${{ matrix.display }}"
            echo
            echo "Sample validation completed successfully."
          } >> "$GITHUB_STEP_SUMMARY"

  quality:
    name: Quality Profile
    runs-on: ubuntu-latest
    needs:
      - docs
      - samples

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run quality profile
        run: ./mvnw -B -ntp -Pquality clean verify

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quality-reports
          path: |
            **/target/spotbugsXml.xml
            **/target/site/spotbugs.html
            **/target/site/jacoco/**
            **/target/site/jacoco-aggregate/**
          if-no-files-found: ignore
          retention-days: 14

  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    needs:
      - docs
      - samples
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build project for CodeQL
        run: ./mvnw -B -ntp -DskipTests verify

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4

  analysis:
    name: Coverage and SonarCloud
    runs-on: ubuntu-latest
    needs:
      - quality
      - codeql
    permissions:
      contents: read
      id-token: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}
          restore-keys: sonar-${{ runner.os }}-

      - name: Build project and generate coverage
        run: ./mvnw -B -ntp -Pquality clean verify

      - name: Publish coverage summary
        if: always()
        run: |
          python3 <<'PY'
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          reports = sorted(Path(".").glob("**/target/site/jacoco/jacoco.xml"))
          reports = [p for p in reports if "samples/" not in p.as_posix()]

          rows = []
          total_missed = 0
          total_covered = 0

          for report in reports:
            root = ET.parse(report).getroot()
            counters = [c for c in root.findall("counter") if c.attrib.get("type") == "INSTRUCTION"]
            if not counters:
              continue

            counter = counters[0]
            missed = int(counter.attrib["missed"])
            covered = int(counter.attrib["covered"])
            total = missed + covered
            pct = (covered / total * 100) if total else 0.0

            module = report.relative_to(Path(".")).as_posix().replace("/target/site/jacoco/jacoco.xml", "")
            rows.append((module, covered, total, pct))
            total_missed += missed
            total_covered += covered

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as summary:
            summary.write("## Coverage Summary\n\n")
            if not rows:
              summary.write("No JaCoCo XML reports were found.\n")
            else:
              total_instructions = total_missed + total_covered
              total_pct = (total_covered / total_instructions * 100) if total_instructions else 0.0
              summary.write(f"**Total instruction coverage:** {total_pct:.2f}% ({total_covered}/{total_instructions})\n\n")
              summary.write("| Module | Coverage |\n")
              summary.write("| --- | ---: |\n")
              for module, covered, total, pct in rows:
                summary.write(f"| `{module}` | {pct:.2f}% ({covered}/{total}) |\n")
          PY

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-reports
          path: |
            **/target/site/jacoco/**
            **/target/site/jacoco-aggregate/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@cf3f51a67d2820f7a7cefa0831889fbbef41ca57 # v5.4.1
        with:
          use_oidc: true
          files: ./build-tools/polyglot-codegen/target/site/jacoco/jacoco.xml,./runtime/polyglot-adapter/target/site/jacoco/jacoco.xml,./runtime/polyglot-spring-boot-starter/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Run SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        run: >
          ./mvnw -B -ntp
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.token="${SONAR_TOKEN}"
          -Dsonar.qualitygate.wait=true

      - name: Skip SonarCloud analysis when token is unavailable
        if: env.SONAR_TOKEN == ''
        run: echo "Skipping SonarCloud analysis because SONAR_TOKEN is not configured."

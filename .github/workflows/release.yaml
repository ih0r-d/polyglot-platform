name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  wait-for-main-ci:
    name: Wait for Main CI
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read

    steps:
      - name: Wait for Checks / Main on release commit
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if ! printf '%s\n' "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "Release tag must look like v0.4.0 or v0.4.0-rc.1. Got: ${RELEASE_TAG}" >&2
            exit 1
          fi

          deadline=$((SECONDS + 1200))
          run_id=""
          run_url=""

          while [ "$SECONDS" -lt "$deadline" ]; do
            runs_json="$(
              gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow ci.yml \
                --commit "$RELEASE_SHA" \
                --branch main \
                --event push \
                --json databaseId,status,conclusion,url \
                --limit 20
            )"

            run_id="$(jq -r 'sort_by(.databaseId) | reverse | .[0].databaseId // empty' <<< "$runs_json")"
            run_url="$(jq -r 'sort_by(.databaseId) | reverse | .[0].url // empty' <<< "$runs_json")"

            if [ -n "$run_id" ]; then
              break
            fi

            echo "Waiting for Checks / Main push run on main for ${RELEASE_SHA}..."
            sleep 20
          done

          if [ -z "$run_id" ]; then
            {
              echo "## Main CI"
              echo
              echo "No matching \`Checks / Main\` push run on \`main\` was found for \`${RELEASE_SHA}\` before timeout."
              echo
              echo "Release tag: \`${RELEASE_TAG}\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "Found Checks / Main run: ${run_url}"

          set +e
          gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status
          watch_exit=$?
          set -e

          run_json="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json databaseId,status,conclusion,url)"
          conclusion="$(jq -r '.conclusion // empty' <<< "$run_json")"
          status="$(jq -r '.status // empty' <<< "$run_json")"
          run_url="$(jq -r '.url // empty' <<< "$run_json")"

          {
            echo "## Main CI"
            echo
            echo "Release tag: \`${RELEASE_TAG}\`"
            echo "Release SHA: \`${RELEASE_SHA}\`"
            echo "CI run: ${run_url}"
            echo "CI status: \`${status}\`"
            echo "CI conclusion: \`${conclusion:-none}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$watch_exit" -ne 0 ] || [ "$conclusion" != "success" ]; then
            echo "Checks / Main did not complete successfully for ${RELEASE_SHA}." >&2
            exit 1
          fi

  validate-release-version:
    name: Validate Release Version
    runs-on: ubuntu-latest
    needs: wait-for-main-ci

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify tag matches project version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(./mvnw -q -DforceStdout org.apache.maven.plugins:maven-help-plugin:3.5.1:evaluate -Dexpression=project.version)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$project_version" != "$tag_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match project.version ${project_version}" >&2
            exit 1
          fi
          if [[ "$project_version" == *-SNAPSHOT ]]; then
            echo "Release tags must point to a non-SNAPSHOT project.version. Got: ${project_version}" >&2
            exit 1
          fi
          echo "version=$project_version" >> "$GITHUB_OUTPUT"

      - name: Validate sample release versions
        run: bash ./.dev/bin/validate-sample-versions.sh "${{ steps.version.outputs.version }}"

      - name: Summarize version validation
        if: success()
        run: |
          {
            echo "## Release Version"
            echo
            echo "Tag: \`${GITHUB_REF_NAME}\`"
            echo "Release SHA: \`${GITHUB_SHA}\`"
            echo "Project version: \`${{ steps.version.outputs.version }}\`"
            echo
            echo "Validated:"
            echo "- tag format was checked before checkout"
            echo "- Checks / Main succeeded for this release commit"
            echo "- tag matches exact Maven project.version"
            echo "- project.version is non-SNAPSHOT"
            echo "- sample polyglot.version values match the release"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-docs:
    name: Verify Docs
    runs-on: ubuntu-latest
    needs:
      - wait-for-main-ci
      - validate-release-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Build documentation
        run: ./.dev/bin/docs-build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

      - name: Summarize docs verification
        if: success()
        run: |
          {
            echo "## Documentation Verification"
            echo
            echo "Completed:"
            echo "- strict MkDocs build"
            echo "- GitHub Pages artifact upload"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-release-candidate:
    name: Verify Release Candidate
    runs-on: ubuntu-latest
    needs:
      - wait-for-main-ci
      - validate-release-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Validate sample release versions
        run: bash ./.dev/bin/validate-sample-versions.sh "${{ needs.validate-release-version.outputs.version }}"

      - name: Run release profile dry run
        run: ./mvnw -B -ntp -Prelease -DskipTests -Dgpg.skip=true -DskipPublishing=true clean verify

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate-artifacts
          path: |
            **/target/*-sources.jar
            **/target/*-javadoc.jar
            **/target/*.jar
            **/target/*.pom
          if-no-files-found: ignore

      - name: Summarize release candidate verification
        if: success()
        run: |
          {
            echo "## Release Candidate"
            echo
            echo "Release version: \`${{ needs.validate-release-version.outputs.version }}\`"
            echo
            echo "Completed:"
            echo "- release profile dry run"
            echo "- signing skipped"
            echo "- Maven Central publishing skipped"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs:
      - wait-for-main-ci
      - validate-release-version
      - verify-docs
      - verify-release-candidate

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Summarize docs deployment
        if: success()
        run: |
          {
            echo "## Documentation Deployment"
            echo
            echo "GitHub Pages deployment completed after release verification and matching main CI passed."
          } >> "$GITHUB_STEP_SUMMARY"

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - wait-for-main-ci
      - validate-release-version
      - deploy-docs

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generateReleaseNotes: true
          allowUpdates: true

      - name: Summarize GitHub release
        if: success()
        run: |
          {
            echo "## GitHub Release"
            echo
            echo "Created or updated release \`${{ github.ref_name }}\` after docs deployment completed."
            echo
            echo "Maven Central publishing remains manual and separate."
          } >> "$GITHUB_STEP_SUMMARY"

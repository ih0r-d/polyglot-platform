name: Release

on:
  workflow_run:
    workflows:
      - Checks / Main
    types:
      - completed
    branches:
      - main

concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect-release:
    name: Detect Release
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'

    outputs:
      release_found: ${{ steps.tag.outputs.release_found }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Discover release tag for CI commit
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          ci_sha="${{ github.event.workflow_run.head_sha }}"
          git fetch --force --tags origin

          mapfile -t release_tags < <(
            git tag --points-at "$ci_sha" \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$' \
              | sort
          )

          if [ "${#release_tags[@]}" -eq 0 ]; then
            echo "release_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${#release_tags[@]}" -gt 1 ]; then
            printf 'Multiple release tags point at CI SHA %s:\n' "$ci_sha" >&2
            printf -- '- %s\n' "${release_tags[@]}" >&2
            exit 1
          fi

          echo "release_found=true" >> "$GITHUB_OUTPUT"
          echo "tag=${release_tags[0]}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches project version
        id: version
        if: steps.tag.outputs.release_found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(./mvnw -q -DforceStdout org.apache.maven.plugins:maven-help-plugin:3.5.1:evaluate -Dexpression=project.version)"
          release_tag="${{ steps.tag.outputs.tag }}"
          tag_version="${release_tag#v}"
          if [ "$project_version" != "$tag_version" ]; then
            echo "Tag ${release_tag} does not match project.version ${project_version}" >&2
            exit 1
          fi
          if [[ "$project_version" == *-SNAPSHOT ]]; then
            echo "Release tags must point to a non-SNAPSHOT project.version. Got: ${project_version}" >&2
            exit 1
          fi
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$project_version" >> "$GITHUB_OUTPUT"

      - name: Validate sample release versions
        if: steps.tag.outputs.release_found == 'true'
        run: bash ./.dev/bin/validate-sample-versions.sh "${{ steps.version.outputs.version }}"

      - name: Summarize skipped release
        if: steps.tag.outputs.release_found == 'false'
        run: |
          {
            echo "## Release"
            echo
            echo "No release tag points at this CI SHA; skipping GitHub Release."
            echo
            echo "CI workflow: \`${{ github.event.workflow_run.name }} #${{ github.event.workflow_run.run_number }}\`"
            echo "CI SHA: \`${{ github.event.workflow_run.head_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize version validation
        if: steps.tag.outputs.release_found == 'true'
        run: |
          {
            echo "## Release Version"
            echo
            echo "CI workflow: \`${{ github.event.workflow_run.name }} #${{ github.event.workflow_run.run_number }}\`"
            echo "CI SHA: \`${{ github.event.workflow_run.head_sha }}\`"
            echo "Tag: \`${{ steps.version.outputs.tag }}\`"
            echo "Project version: \`${{ steps.version.outputs.version }}\`"
            echo
            echo "Validated:"
            echo "- CI completed successfully for a push to main"
            echo "- exactly one release tag points at the CI SHA"
            echo "- release tag format is vX.Y.Z or vX.Y.Z-rc.N"
            echo "- tag matches exact Maven project.version"
            echo "- project.version is non-SNAPSHOT"
            echo "- sample polyglot.version values match the release"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-docs:
    name: Verify Docs
    runs-on: ubuntu-latest
    needs: detect-release
    if: needs.detect-release.outputs.release_found == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Build documentation
        run: ./.dev/bin/docs-build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

      - name: Summarize docs verification
        if: success()
        run: |
          {
            echo "## Documentation Verification"
            echo
            echo "Completed:"
            echo "- strict MkDocs build"
            echo "- GitHub Pages artifact upload"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-release-candidate:
    name: Verify Release Candidate
    runs-on: ubuntu-latest
    needs: detect-release
    if: needs.detect-release.outputs.release_found == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Validate sample release versions
        run: bash ./.dev/bin/validate-sample-versions.sh "${{ needs.detect-release.outputs.version }}"

      - name: Run release profile dry run
        run: ./mvnw -B -ntp -Prelease -DskipTests -Dgpg.skip=true -DskipPublishing=true clean verify

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate-artifacts
          path: |
            **/target/*-sources.jar
            **/target/*-javadoc.jar
            **/target/*.jar
            **/target/*.pom
          if-no-files-found: ignore

      - name: Summarize release candidate verification
        if: success()
        run: |
          {
            echo "## Release Candidate"
            echo
            echo "Release version: \`${{ needs.detect-release.outputs.version }}\`"
            echo
            echo "Completed:"
            echo "- release profile dry run"
            echo "- signing skipped"
            echo "- Maven Central publishing skipped"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs:
      - detect-release
      - verify-docs
      - verify-release-candidate
    if: needs.detect-release.outputs.release_found == 'true'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Summarize docs deployment
        if: success()
        run: |
          {
            echo "## Documentation Deployment"
            echo
            echo "GitHub Pages deployment completed after all release verification jobs passed."
          } >> "$GITHUB_STEP_SUMMARY"

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - detect-release
      - deploy-docs
    if: needs.detect-release.outputs.release_found == 'true'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ needs.detect-release.outputs.tag }}
          name: Release ${{ needs.detect-release.outputs.tag }}
          generateReleaseNotes: true
          allowUpdates: true

      - name: Summarize GitHub release
        if: success()
        run: |
          {
            echo "## GitHub Release"
            echo
            echo "Created or updated release \`${{ needs.detect-release.outputs.tag }}\` after docs deployment completed."
            echo
            echo "Maven Central publishing remains manual and separate."
          } >> "$GITHUB_STEP_SUMMARY"

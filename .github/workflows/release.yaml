name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Validate release tag format
        run: |
          if ! printf '%s\n' "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Release tag must look like v0.4.0 or v0.4.0-rc.1. Got: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Verify tag matches project version
        run: |
          project_version="$(./mvnw -q -DforceStdout org.apache.maven.plugins:maven-help-plugin:3.5.1:evaluate -Dexpression=project.version)"
          release_version="${project_version%-SNAPSHOT}"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$release_version" != "$tag_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match project version ${project_version}" >&2
            exit 1
          fi

      - name: Run release quality verification
        run: ./mvnw -B -ntp -Pquality verify

      - name: Run release profile dry run
        run: ./mvnw -B -ntp -Prelease -Dgpg.skip=true -DskipTests clean verify

      - name: Summarize release verification
        if: success()
        run: |
          {
            echo "## Release Verification"
            echo
            echo "Release tag: \`${GITHUB_REF_NAME}\`"
            echo
            echo "Validated:"
            echo "- tag format"
            echo "- tag matches Maven project version"
            echo "- quality profile"
            echo "- release profile dry run with signing skipped"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generateReleaseNotes: true
          allowUpdates: true

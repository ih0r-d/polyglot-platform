name: Samples / Smoke

on:
  pull_request:
    branches:
      - main
      - release/*
    paths:
      - ".github/workflows/samples.yml"
      - ".mvn/**"
      - "mvnw"
      - "mvnw.cmd"
      - "pom.xml"
      - "api/**"
      - "runtime/**"
      - "build-tools/**"
      - "samples/**"
  push:
    branches:
      - main
      - release/*
    paths:
      - ".github/workflows/samples.yml"
      - ".mvn/**"
      - "mvnw"
      - "mvnw.cmd"
      - "pom.xml"
      - "api/**"
      - "runtime/**"
      - "build-tools/**"
      - "samples/**"
  workflow_dispatch:

concurrency:
  group: samples-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  java-maven-example:
    name: Java Maven Example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "25"
          cache: maven

      - name: Install local platform artifacts
        run: ./mvnw -B -ntp -DskipTests install

      - name: Verify sample
        run: mvn -B -ntp -DskipTests verify
        working-directory: samples/java-maven-example

  java-maven-codegen-example:
    name: Java Maven Codegen Example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "25"
          cache: maven

      - name: Install local platform artifacts
        run: ./mvnw -B -ntp -DskipTests install

      - name: Verify sample
        run: mvn -B -ntp -DskipTests verify
        working-directory: samples/java-maven-codegen-example

  spring-boot-example:
    name: Spring Boot Example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "25"
          cache: maven

      - name: Install local platform artifacts
        run: ./mvnw -B -ntp -DskipTests install

      - name: Verify sample
        run: mvn -B -ntp -DskipTests verify
        working-directory: samples/spring-boot-example

  java-python-aot-fat-jar:
    name: Java+Python AOT / JVM Fat JAR
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "25"
          cache: maven

      - name: Install local platform artifacts
        run: ./mvnw -B -ntp -DskipTests install

      - name: Build fat JAR
        run: mvn -B -ntp clean package
        working-directory: samples/java-python-aot-adapter

      - name: Run fat JAR
        run: java -jar target/java-python-aot-adapter-0.0.1-all.jar
        working-directory: samples/java-python-aot-adapter

      - name: Summarize JVM sample result
        if: success()
        run: |
          {
            echo "## Java+Python AOT Sample"
            echo
            echo "JVM fat JAR build and execution completed successfully."
            echo
            echo "Local reproduction:"
            echo "\`\`\`bash"
            echo "./mvnw -B -ntp -DskipTests install"
            echo "mvn -B -ntp clean package -f samples/java-python-aot-adapter/pom.xml"
            echo "java -jar samples/java-python-aot-adapter/target/java-python-aot-adapter-0.0.1-all.jar"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  java-python-aot-native-image:
    name: Java+Python AOT / Native Image
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "25"
          native-image-job-reports: "true"
          cache: maven

      - name: Install local platform artifacts
        run: ./mvnw -B -ntp -DskipTests install

      - name: Build native image via script
        run: |
          chmod +x ./build-native.sh
          ./build-native.sh
        working-directory: samples/java-python-aot-adapter

      - name: Run native image
        run: ./target/java-python-aot-adapter
        working-directory: samples/java-python-aot-adapter

      - name: Summarize native-image sample result
        if: success()
        run: |
          {
            echo "## Java+Python AOT Sample"
            echo
            echo "Native image build and execution completed successfully."
            echo
            echo "Local reproduction:"
            echo "\`\`\`bash"
            echo "./mvnw -B -ntp -DskipTests install"
            echo "cd samples/java-python-aot-adapter"
            echo "./build-native.sh"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

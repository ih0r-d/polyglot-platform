name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish, for example v0.2.1
        required: true
        type: string

concurrency:
  group: publish-maven-central-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish Maven Central
    runs-on: ubuntu-latest
    environment: maven-central

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag }}

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Validate publish input
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if ! printf '%s\n' "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Publish tag must look like v0.4.0 or v0.4.0-rc.1. Got: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Verify publishing secrets are configured
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          missing=0
          for name in MAVEN_USERNAME MAVEN_PASSWORD GPG_PRIVATE_KEY GPG_PASSPHRASE; do
            if [ -z "${!name}" ]; then
              echo "Missing required publishing secret: ${name}" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Verify tag exists locally
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          git rev-parse --verify "refs/tags/${RELEASE_TAG}"

      - name: Verify tag matches project version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          project_version="$(./mvnw -q -DforceStdout org.apache.maven.plugins:maven-help-plugin:3.5.1:evaluate -Dexpression=project.version)"
          release_version="${project_version%-SNAPSHOT}"
          tag_version="${RELEASE_TAG#v}"
          if [ "$release_version" != "$tag_version" ]; then
            echo "Tag ${RELEASE_TAG} does not match project version ${project_version}" >&2
            exit 1
          fi

      - name: Show Central Publishing configuration
        run: |
          ./mvnw -B -ntp -Prelease -pl api/polyglot-annotations help:effective-pom \
            -Doutput=target/effective-publish-config.xml

          python3 <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          path = Path("api/polyglot-annotations/target/effective-publish-config.xml")
          root = ET.parse(path).getroot()
          ns = {"m": "http://maven.apache.org/POM/4.0.0"}

          plugins = root.findall("./m:build/m:plugins/m:plugin", ns)
          central = None
          for plugin in plugins:
            group_id = plugin.findtext("m:groupId", default="", namespaces=ns)
            artifact_id = plugin.findtext("m:artifactId", default="", namespaces=ns)
            if group_id == "org.sonatype.central" and artifact_id == "central-publishing-maven-plugin":
              central = plugin
              break

          if central is None:
            print("Central Publishing plugin is not active in the release effective POM.", file=sys.stderr)
            sys.exit(1)

          def text(path, default=""):
            return central.findtext(path, default=default, namespaces=ns)

          print("Central Publishing effective configuration:")
          print(f"- artifactId: {text('m:artifactId')}")
          print(f"- version: {text('m:version')}")
          print(f"- extensions: {text('m:extensions')}")
          print(f"- publishingServerId: {text('m:configuration/m:publishingServerId')}")
          print(f"- skipPublishing: {text('m:configuration/m:skipPublishing')}")
          print(f"- autoPublish: {text('m:configuration/m:autoPublish')}")
          print(f"- waitUntil: {text('m:configuration/m:waitUntil')}")

          if text("m:extensions") != "true":
            print("Central Publishing plugin must run as a Maven extension.", file=sys.stderr)
            sys.exit(1)
          if text("m:configuration/m:publishingServerId") != "central":
            print("Central Publishing server id must be central.", file=sys.stderr)
            sys.exit(1)
          if text("m:configuration/m:skipPublishing") == "true":
            print("Central Publishing must not be skipped in the release profile.", file=sys.stderr)
            sys.exit(1)
          PY

      - name: Run release profile dry run
        run: ./mvnw -B -ntp -Prelease -Dgpg.skip=true -DskipTests clean verify

      # Tests, JaCoCo (70 % instruction coverage), Spotless, and SpotBugs must all
      # pass before the release profile signs and deploys artifacts to Maven Central.
      - name: Verify and deploy to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./mvnw -B -ntp -Prelease,quality deploy \
            -Dgpg.passphrase="${GPG_PASSPHRASE}"

      - name: Summarize Maven Central publish
        if: success()
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          {
            echo "## Maven Central Publish"
            echo
            echo "Published tag: \`${RELEASE_TAG}\`"
            echo
            echo "Validated:"
            echo "- publish tag format"
            echo "- required publishing secrets are configured"
            echo "- tag exists in the checked-out repository"
            echo "- tag matches Maven project version"
            echo "- Central Publishing release profile is active for published modules"
            echo "- release profile dry run"
            echo "- release and quality profiles during deploy"
          } >> "$GITHUB_STEP_SUMMARY"
